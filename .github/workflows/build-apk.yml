name: Build APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install PWABuilder
        run: npm install -g @pwabuilder/pwabuilder
      - name: Build APK
        run: pwabuilder package --platform android
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app
          path: pwabuilder-output/*.apk
